setw -g mouse on 

unbind C-b

set-option -g prefix C-a

# reload config file
unbind r
bind r source-file ~/.tmux.conf \; #display "Reloaded ~/.tmux.conf"

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

set -g base-index 1

set -g -a terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -s default-terminal 'tmux-256color'

# # statusbar
set -g status-bg '#1c1c1c'
set -g status-fg '#A9B2D2'
set -g status-left '#[bg=#ffd7af] 👾 '
set -g status-right '#[bg=#262626] %m/%d ❬ %I:%M %p ❭ '

 
set -g window-status-current-format "#[bg=#262626]   #I #W  "
set -g window-status-format "#[nobold,noitalics,nounderscore]   #I #W #F  "

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin "janoamaral/tokyo-night-tmux" 


run '~/.tmux/plugins/tpm/tpm'
