[settings]
idiomatic_version_file_enable_tools = ["dotnet"]

[settings.ruby]

[settings.dotnet]
isolated = false

[tools]
bun = "latest"
dotnet = ["10", "9", "8"]
go = "latest"
gum = "latest"
marksman = "latest"
node = "latest"
python = "latest"
shfmt = "latest"
stylua = "latest"
biome = "latest"
oxfmt = "latest"
oxlint = "latest"
taplo = "latest"
"go:golang.org/x/tools/gopls" = "latest"
"npm:@fsouza/prettierd" = "latest"
"npm:bash-language-server" = "latest"
"pipx:xmlformatter" = "latest"
"npm:@github/copilot-language-server" = "latest"
"npm:svelte-language-server" = "latest"
"npm:@tailwindcss/language-server" = "latest"
"npm:@vtsls/language-server" = "latest"
"npm:vscode-langservers-extracted" = "latest"
"npm:yaml-language-server" = "latest"

# The release ships one archive per tool per platform; mise's automatic asset
# scoring picks the wrong one (win32 on linux), so pin each platform's asset.
[tools."github:EmmyLuaLs/emmylua-analyzer-rust"]
version = "latest"

[tools."github:EmmyLuaLs/emmylua-analyzer-rust".platforms]
macos-arm64 = { asset_pattern = "emmylua_ls-darwin-arm64.tar.gz" }
macos-x64 = { asset_pattern = "emmylua_ls-darwin-x64.tar.gz" }
linux-x64 = { asset_pattern = "emmylua_ls-linux-x64.tar.gz" }
linux-arm64 = { asset_pattern = "emmylua_ls-linux-aarch64-glibc.2.17.tar.gz" }
