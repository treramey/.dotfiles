[settings]
animate = true
animation_duration = 0.1
animation_fps = 60

auto_focus_blacklist = ["com.raycast.macos"]
run_on_start = []
hot_reload = true

[settings.layout]
mode = "bsp"

[settings.layout.master_stack]
master_ratio = 0.6
master_count = 1
master_side = "left"
new_window_placement = "master"

[settings.layout.scrolling]
column_width_ratio = 0.7
min_column_width_ratio = 0.3
max_column_width_ratio = 0.9
alignment = "center"
focus_navigation_style = "niri"
animate = false

[settings.layout.stack]
stack_offset = 40.0

default_orientation = "perpendicular"

[settings.layout.gaps]

[settings.layout.gaps.outer]
top = 5
left = 5
bottom = 5
right = 5

[settings.layout.gaps.inner]
horizontal = 10
vertical = 10

# built in display
[settings.layout.gaps.per_display."37D8832A-2D66-02CA-B9F7-8F30A301B230".outer]
top = 5
left = 5
bottom = 5
right = 5

[settings.ui.stack_line]
enabled = true
horiz_placement = "top"
vert_placement = "left"
thickness = 20.0
spacing = 1.0

[virtual_workspaces]
enabled = true
default_workspace_count = 5
auto_assign_windows = true
preserve_focus_per_workspace = true
workspace_auto_back_and_forth = false
reapply_app_rules_on_title_change = false

workspace_rules = []

workspace_names = [
	"browse",
	"code",
	"coms",
	"music",
  "misc",
]

app_rules = [
  { title_substring = "Preferences", floating = true },
  { title_substring = "Settings", floating = true },
  { title_substring = "Bitwarden", floating = true },
  { app_id = "com.electron.wispr-flow", floating = true },
	{ app_id = "org.mozilla.firefox", workspace = 0 },
	{ app_id = "com.google.Chrome", workspace = 0 },
	{ app_id = "net.imput.helium", workspace = 0 },
	{ app_id = "com.microsoft.edgemac", workspace = 0 },
	{ app_id = "com.mitchellh.ghostty", workspace = 1 },
	{ app_id = "org.wezfurlong.wezterm", workspace = 1 },
	{ app_id = "com.microsoft.VSCode", workspace = 1 },
	{ app_id = "com.visualstudio.code", workspace = 1 },
	{ app_id = "com.microsoft.teams", workspace = 2 },
	{ app_id = "com.microsoft.teams2", workspace = 2 },
	{ app_id = "com.tinyspeck.slackmacgap", workspace = 2 },
	{ app_id = "com.spotify.client", workspace = 3 },

]

[modifier_combinations]
main = "AltLeft"
secondary = "AltLeft + Shift"

[keys]
"main + Z" = "toggle_space_activated"

"main + H" = { move_focus = "left" }
"main + J" = { move_focus = "down" }
"main + K" = { move_focus = "up" }
"main + L" = { move_focus = "right" }

"secondary + H" = { move_node = "left" }
"secondary + J" = { move_node = "down" }
"secondary + K" = { move_node = "up" }
"secondary + L" = { move_node = "right" }

# workspace bindings handled by skhd (lalt + 1-5) for proper left/right alt distinction

"main + Tab" = "switch_to_last_workspace"

# commands to change the layout engine of the active workspace
"main + Ctrl + 1" = { set_workspace_layout = { mode = "traditional" } }
"main + Ctrl + 2" = { set_workspace_layout = { mode = "bsp" } }
"main + Ctrl + 3" = { set_workspace_layout = { mode = "master_stack" } }
"main + Ctrl + 4" = { set_workspace_layout = { mode = "scrolling" } }

"secondary + Left" = { join_window = "left" }
"secondary + Right" = { join_window = "right" }
"secondary + Up" = { join_window = "up" }
"secondary + Down" = { join_window = "down" }
"main + Comma" = "toggle_stack"
"main + Slash" = "toggle_orientation"
"AltLeft + Ctrl + E" = "unjoin_windows"

"secondary + Space" = "toggle_window_floating"
"main + F" = "toggle_fullscreen"
"secondary + F" = "toggle_fullscreen_within_gaps"

# smartly resize windows
"secondary + Equal" = "resize_window_grow"
"secondary + Minus" = "resize_window_shrink"

# Move mouse cursor to display by index (0-based) or UUID
# Examples:
"secondary + A" = { focus_display = 0 }
"secondary + S" = { focus_display = 1 }

# Move a window to a display by index (mirrors focus_display bindings with Ctrl)
"AltLeft + Shift + Ctrl + A" = { move_window_to_display = { selector = 0 } }
"AltLeft + Shift + Ctrl + S" = { move_window_to_display = { selector = 1 } }

# if mission control is enabled
# this will show an exploded view of the windows in the active workspace
"AltLeft + Ctrl + Shift + M" = "show_mission_control_current"
# this will show the mission control view shown in the readme
"AltLeft + Ctrl + M" = "show_mission_control_all"


"secondary + D " = "debug" # prints layout tree

"AltLeft + Ctrl + S" = "serialize"
"AltLeft + Ctrl + Q" = "save_and_exit"
