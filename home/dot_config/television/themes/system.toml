# Television theme that follows the terminal/system palette.
# Uses ANSI color names instead of fixed hex values, and leaves background unset.
# This keeps tv aligned with the active Omarchy/Ghostty palette in light and dark modes.

# general
# background intentionally unset so the terminal background is used
border_fg = 'bright-black'
text_fg = 'white'
dimmed_text_fg = 'bright-black'

# input
input_text_fg = 'bright-white'
result_count_fg = 'bright-red'

# results
result_name_fg = 'white'
result_line_number_fg = 'bright-yellow'
result_value_fg = 'white'
# Use terminal palette colors that stay readable in both light and dark themes.
# Black text on a colored ANSI background works better than white-on-blue here.
selection_fg = 'black'
selection_bg = 'cyan'
match_fg = 'bright-red'

# preview
preview_title_fg = 'bright-magenta'

# modes
channel_mode_fg = 'black'
channel_mode_bg = 'cyan'
remote_control_mode_fg = 'black'
remote_control_mode_bg = 'bright-yellow'
action_picker_mode_fg = 'black'
action_picker_mode_bg = 'bright-magenta'
send_to_channel_mode_fg = 'cyan'
