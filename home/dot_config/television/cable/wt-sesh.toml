[metadata]
name = "wt-sesh"
description = "A channel to select worktrees to create sessions with"
requirements = ["fd"]

[ui]
orientation = "portrait"

[source]
command = ["fd -t d -d 5"]
output = "{split:,:..|sort:desc}"

[preview]
hidden = true
command = "ls --color=always '{}'"

[keybindings]
enter = "actions:connect"

[actions.connect]
description = "Connect to selected session"
command = "sesh connect '{}'"
mode = "execute"
